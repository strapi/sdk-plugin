name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    if: github.repository == 'strapi/sdk-plugin'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write # Required for npm trusted publishing (OIDC)
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version: lts/*
          registry-url: 'https://registry.npmjs.org' # Pin the publish registry for npm trusted publishing (OIDC)
      - run: pnpm --version
      # npm trusted publishing (OIDC) requires npm CLI >= 11.5.1
      - run: npm install -g npm@11.17.0
      - run: npm --version
      - run: pnpm install
      - run: pnpm build

      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm release:version
          publish: pnpm release:publish
          commit: 'chore: version packages for release'
          title: 'chore: version packages for release'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
